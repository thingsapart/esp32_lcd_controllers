; ── Jingcai JC1060P470 ────────────────────────────────────────────────────────
;   MCU : ESP32-P4 (16 MB flash, 8 MB OPI PSRAM)
;   LCD : JD9165 1024×600 MIPI-DSI   Touch: GT911 (I2C0)
[lcd_ctrl_jc1060p470]
platform          = ${lcd_ctrl_platform_pioarduino.platform}
platform_packages = ${lcd_ctrl_platform_pioarduino.platform_packages}
framework         = ${lcd_ctrl_platform_pioarduino.framework}
board             = esp32p4
board_build.flash_size   = 16MB
board_upload.flash_size  = 16MB
board_build.partitions   = config/esp32/partitions_16MB_4MB_app.csv
board_build.f_cpu        = 360000000L
board_build.psram        = enabled
board_build.psram_type   = opi
board_upload.maximum_size = 16777216
monitor_speed     = 115200
upload_speed      = 460800

build_unflags     = ${lcd_ctrl_base_p4.build_unflags}
build_flags       = ${lcd_ctrl_base_p4.build_flags}
    -D JC1060P470_BOARD
    -D JC1060P470
    -D ESP32_LVGL_ESP_DISP
    -D TFT_WIDTH=1024
    -D TFT_HEIGHT=600
    -D LVGL_PORT_AVOID_TEAR_ENABLE=1
    -D LVGL_PORT_AVOID_TEAR_MODE=3
    -D LVGL_PORT_PPA_ROTATION_ENABLE=0

