; =============================================================================
; esp32_lcd_controllers.ini — Reusable PlatformIO configuration fragments
;
; Usage in your project's platformio.ini:
;
;   [platformio]
;   extra_configs = ext/esp32_lcd_controllers/esp32_lcd_controllers.ini
;
;   [env:my_guition_app]
;   extends = lcd_ctrl_4848s040            ; inherit board + LVGL flags
;   lib_extra_dirs = ext/esp32_lcd_controllers/src  ; compile the library
;   build_flags = ${lcd_ctrl_4848s040.build_flags}
;       -I ext/esp32_lcd_controllers/src
;       -D MY_APP_FLAG=1
;   build_src_filter = +<*>               ; your src/**
;       +<../../ext/esp32_lcd_controllers/src/driver/**>
;
; See README.md for full integration guide.
; =============================================================================

; ─── Platform versions ───────────────────────────────────────────────────────

[lcd_ctrl_platform_tasmota]
; Tasmota platform — well-tested, ships a large pre-built IDF component set.
; Pin to a specific date-based release for reproducibility.
platform          = https://github.com/tasmota/platform-espressif32/releases/download/2026.02.30/platform-espressif32.zip
platform_packages =
framework         = arduino

[lcd_ctrl_platform_pioarduino]
; pioarduino platform — often has the newest IDF + GCC; useful for P4 targets
; where Tasmota hasn't caught up yet.
platform          = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21-2/platform-espressif32.zip
platform_packages =
framework         = arduino

; ─── Shared base settings ────────────────────────────────────────────────────

[lcd_ctrl_base]
; Common settings applied to every board variant.
framework         = arduino
board_build.filesystem = littlefs
monitor_speed     = 115200
monitor_echo      = yes
check_skip_packages = yes
lib_archive       = no
lib_ldf_mode      = chain
lib_compat_mode   = strict

build_unflags     =
build_flags       =
    -Wno-deprecated-declarations
    -Os
    -fno-strict-aliasing
    -Wreturn-type
    -D ESP32_HW=1
    -D LGFX_USE_V1=1
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_LVGL_H_INCLUDE_SIMPLE
    -D LV_COMP_CONF_INCLUDE_SIMPLE
    -D LITTLEFS=LittleFS

lib_deps =
    https://github.com/lvgl/lvgl

; ─── MCU-family sub-sections ─────────────────────────────────────────────────

[lcd_ctrl_base_s3]
; ESP32-S3: dual-core Xtensa, optional OPI PSRAM, up to 16 MB flash.
extends         = lcd_ctrl_base

build_unflags   = ${lcd_ctrl_base.build_unflags}
    -mtarget-align
    -fno-exceptions
build_flags     = ${lcd_ctrl_base.build_flags}
    -mno-target-align
    -D ARDUINO_ESP32S3_DEV
    -D ESP32S3_HW
    -D BOARD_HAS_PSRAM
    -D ARDUINO_RUNNING_CORE=1
    -D ARDUINO_LOOP_STACK_SIZE=6144
monitor_filters = esp32_exception_decoder

[lcd_ctrl_base_c3]
; ESP32-C3: single-core RISC-V, 4 MB flash, no PSRAM.
extends         = lcd_ctrl_base

build_unflags   = ${lcd_ctrl_base.build_unflags}
    -mtarget-align
    -mno-target-align
    -free
    -D BOARD_HAS_PSRAM
build_flags     = ${lcd_ctrl_base.build_flags}
    -UBOARD_HAS_PSRAM
    -D HW_ESP32_C3
    -D ARDUINO_RUNNING_CORE=0
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
monitor_filters = esp32_exception_decoder

[lcd_ctrl_base_p4]
; ESP32-P4: dual-core RISC-V, large PSRAM, MIPI-DSI.
extends         = lcd_ctrl_base

build_unflags   = ${lcd_ctrl_base.build_unflags}
    -mtarget-align
    -mno-target-align
    -flto
    -flto=auto
    -std=gnu++11
    -fno-exceptions
build_flags     = ${lcd_ctrl_base.build_flags}
    -std=c++17
    -D ARDUINO_ESP32P4DEV
    -D ESP32P4_HW
    -D BOARD_HAS_PSRAM
    -D ARDUINO_RUNNING_CORE=1
monitor_filters = esp32_exception_decoder

; ─── Per-board environments ───────────────────────────────────────────────────
; Each section below is a NAMED SECTION (not [env:…]) so it can be inherited
; via  extends = lcd_ctrl_<name>  without being a top-level build target.
; Users create their own  [env:my_app]  that extends one of these.

; ── Guition / Sunton ESP32-4848S040 ──────────────────────────────────────────
;   MCU : ESP32-S3-WROOM-1-N16R8 (16 MB flash, 8 MB OPI PSRAM)
;   LCD : ST7701 480×480 RGB565 parallel (ST7701S + GT911 touch)
;   Touch : GT911 (I2C1: SDA=6 SCL=5)  Encoder: 11/10
[lcd_ctrl_4848s040]
platform          = ${lcd_ctrl_platform_tasmota.platform}
platform_packages = ${lcd_ctrl_platform_tasmota.platform_packages}
framework         = ${lcd_ctrl_platform_tasmota.framework}
board             = esp32s3_4848s040
board_build.flash_size   = 16MB
board_upload.flash_size  = 16MB
board_build.partitions   = config/esp32/partitions_16MB_4MB_app.csv
board_build.f_cpu        = 240000000L
upload_speed      = 460800

build_unflags     = ${lcd_ctrl_base_s3.build_unflags}
build_flags       = ${lcd_ctrl_base_s3.build_flags}
    -D GUITION_4848S040=1
    -D ESP32_PARALLEL=1
    -D ST7796_DRIVER=1
    -D TOUCH_DRIVER=0x6336
    -D TFT_WIDTH=480
    -D TFT_HEIGHT=480
    -D SPI_FREQUENCY=20000000
    -D I2C_TOUCH_FREQUENCY=400000
    -D I2C_TOUCH_ADDRESS=0x38
    -D I2C_TOUCH_PORT=1
    -D TOUCH_SDA=6
    -D TOUCH_SCL=5
    -D LV_COLOR_16_SWAP=0
    -D LED_PIN=16
    -D NO_TOUCH_CAL

lib_deps          = ${lcd_ctrl_base_s3.lib_deps}
    lovyan03/LovyanGFX

custom_sdkconfig  =
    CONFIG_SPIRAM=y
    CONFIG_SPIRAM_MODE_OCT=y
    CONFIG_SPIRAM_SPEED_80M=y
    CONFIG_SPIRAM_USE_MALLOC=y
    CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL=4096
    CONFIG_SPIRAM_FETCH_INSTRUCTIONS=y
    CONFIG_SPIRAM_RODATA=y
    CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB=y
    CONFIG_ESP32S3_DATA_CACHE_32KB=y
    CONFIG_ESP32S3_DATA_CACHE_LINE_32B=y
    CONFIG_ARDUINO_LOOP_STACK_SIZE=6144
    CONFIG_ESPTOOLPY_FLASHFREQ_80M=y
    CONFIG_ESPTOOLPY_FLASHFREQ="80m"
    CONFIG_ESPTOOLPY_FLASHSIZE_16MB=y
    CONFIG_CXX_EXCEPTIONS=n
    CONFIG_BT_ENABLED=n
    CONFIG_BT_CONTROLLER_ENABLED=n
    CONFIG_APP_ROLLBACK_ENABLE=n
    CONFIG_BOOTLOADER_APP_ROLLBACK_ENABLE=n
    CONFIG_ESP_TIMER_TASK_STACK_SIZE=4096
    CONFIG_TCP_WND_DEFAULT=5760
    CONFIG_TCP_SND_BUF_DEFAULT=5760
    CONFIG_PPP_SUPPORT=n
    CONFIG_LWIP_IPV6=n
    CONFIG_LWIP_MAX_SOCKETS=8
    CONFIG_MBEDTLS_ASYMMETRIC_CONTENT_LEN=y
    CONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=16384
    CONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=4096

; ── Waveshare / Sunton ESP32-2424S012C ───────────────────────────────────────
;   MCU : ESP32-C3-MINI-1U (4 MB flash, no PSRAM)
;   LCD : GC9A01 240×240 round IPS (SPI2)  Touch: CST816S (I2C0)
[lcd_ctrl_2424s012]
platform          = ${lcd_ctrl_platform_tasmota.platform}
platform_packages = ${lcd_ctrl_platform_tasmota.platform_packages}
framework         = ${lcd_ctrl_platform_tasmota.framework}
board             = esp32c3
board_upload.flash_size  = 4MB
board_upload.maximum_size = 4194304
board_build.partitions   = config/esp32/partitions_4MB.csv
upload_speed      = 460800

build_unflags     = ${lcd_ctrl_base_c3.build_unflags}
build_flags       = ${lcd_ctrl_base_c3.build_flags}
    -D ESP32_2424S012=1
    -D GC9A01_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=240
    -D TFT_MOSI=7
    -D TFT_SCLK=6
    -D TFT_CS=10
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BCKL=3
    -D I2C_TOUCH_PORT=0
    -D I2C_TOUCH_ADDRESS=0x15
    -D I2C_TOUCH_FREQUENCY=400000
    -D TOUCH_SDA=4
    -D TOUCH_SCL=5
    -D TOUCH_INT=0
    -D TOUCH_RST=1
    -D LV_COLOR_16_SWAP=0

lib_deps          = ${lcd_ctrl_base_c3.lib_deps}
    https://github.com/lovyan03/LovyanGFX.git

; Note: LovyanGFX GitHub HEAD has IDF-5.x C3 GPIO fix not yet in registry.
; If build fails on C3 GPIO struct rename, apply tools/patch_lgfx_c3.py.

; ── Makerfabs / Guition JC3248W535C ──────────────────────────────────────────
;   MCU : ESP32-S3-N8R8 (8 MB flash, 8 MB OPI PSRAM)
;   LCD : AXS15231B 320×480 QSPI (landscape 480×320 via 90° SW rotation)
;   Touch : AXS15231B integrated (I2C0: SCL=8 SDA=4 addr=0x3B)
