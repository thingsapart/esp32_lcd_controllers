platform          = ${lcd_ctrl_platform_tasmota.platform}
platform_packages = ${lcd_ctrl_platform_tasmota.platform_packages}
framework         = ${lcd_ctrl_platform_tasmota.framework}
board             = esp32s3_qio_opi
board_build.f_flash      = 80000000L
board_build.flash_freq   = 80m
board_build.psram_type   = opi
board_build.flash_size   = 8MB
board_upload.flash_size  = 8MB
board_build.partitions   = config/esp32/partitions_8MB.csv
board_build.f_cpu        = 240000000L
upload_speed      = 460800

build_unflags     = ${lcd_ctrl_base_s3.build_unflags}
build_flags       = ${lcd_ctrl_base_s3.build_flags}
    -D JC3248W535C=1
    -D HW_AXS15231B
    -D JC3248W535C_TOUCH_I2C
    -D JC3248W535C_RENDER_DIRECT
    -D JC3248W535C_ROT_90_CCW
    -D JC3248W535C_NO_VSYNC
    -D TFT_WIDTH=480
    -D TFT_HEIGHT=320
    -D TFT_CS=45
    -D TFT_PCLK=47
    -D TFT_D0=21
    -D TFT_D1=48
    -D TFT_D2=40
    -D TFT_D3=39
    -D TFT_RST=-1
    -D TFT_BCKL=1
    -D TFT_TE=38
    -D I2C_TOUCH_PORT=0
    -D I2C_TOUCH_ADDRESS=0x3B
    -D I2C_TOUCH_FREQUENCY=400000
    -D TOUCH_SCL=8
    -D TOUCH_SDA=4
    -D LV_COLOR_16_SWAP=0
    -D LVGL_TASK_PSRAM=1

lib_deps          = ${lcd_ctrl_base_s3.lib_deps}

custom_sdkconfig  =
    CONFIG_SPIRAM=y
    CONFIG_SPIRAM_MODE_OCT=y
    CONFIG_SPIRAM_SPEED_80M=y
    CONFIG_SPIRAM_USE_MALLOC=y
    CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL=4096
    CONFIG_SPIRAM_FETCH_INSTRUCTIONS=y
    CONFIG_SPIRAM_RODATA=y
    CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB=y
    CONFIG_ESP32S3_DATA_CACHE_32KB=y
    CONFIG_ESP32S3_DATA_CACHE_LINE_32B=y
    CONFIG_ARDUINO_LOOP_STACK_SIZE=6144
    CONFIG_ESPTOOLPY_FLASHFREQ_80M=y
    CONFIG_ESPTOOLPY_FLASHFREQ="80m"
    CONFIG_ESPTOOLPY_FLASHSIZE_8MB=y
    CONFIG_CXX_EXCEPTIONS=n
    CONFIG_BT_ENABLED=n
    CONFIG_BT_CONTROLLER_ENABLED=n
    CONFIG_APP_ROLLBACK_ENABLE=n
    CONFIG_BOOTLOADER_APP_ROLLBACK_ENABLE=n
    CONFIG_ESP_TIMER_TASK_STACK_SIZE=4096
    CONFIG_TCP_WND_DEFAULT=5760
    CONFIG_TCP_SND_BUF_DEFAULT=5760
    CONFIG_PPP_SUPPORT=n
    CONFIG_LWIP_IPV6=n
    CONFIG_LWIP_MAX_SOCKETS=8
    CONFIG_MBEDTLS_ASYMMETRIC_CONTENT_LEN=y
    CONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=16384
    CONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=4096

