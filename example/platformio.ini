; =============================================================================
; Example platformio.ini — esp32_lcd_controllers Hello World
;
; This project lives INSIDE the submodule at:
;   esp32_lcd_controllers/example/
;
; All paths below are relative to this file (i.e. to the example/ directory).
; When you copy this example to an external project that has the submodule at
; ext/esp32_lcd_controllers/, replace every `../` with `ext/esp32_lcd_controllers/`.
; =============================================================================

[platformio]
; Pull in the shared board/platform fragments from the parent directory.
extra_configs = ../esp32_lcd_controllers.ini
boards_dir    = ../boards
description   = esp32_lcd_controllers Hello World example

; ─── Note on include paths ───────────────────────────────────────────────────
; lib_extra_dirs = ../ tells PlatformIO to treat the submodule root as a library.
; -I ../src   adds driver sub-directories to the search path.
; -I ../include  adds lcd_controllers.h.
; -I .         lets lvgl/LVGL find lv_conf.h in this directory.

; =============================================================================
; ── Waveshare ESP32-2424S012C  ── (simplest board; use this to get started)
; MCU : ESP32-C3, 4 MB flash, no PSRAM
; LCD : 240x240 round GC9A01 (SPI2) + CST816S touch (I2C0)
; =============================================================================
; lib_ldf_mode = chain+ causes PlatformIO to trace #includes inside library
; headers.  lib_deps = symlink://../ forces the full esp32_lcd_controllers
; library (src/**) to be compiled and linked, bypassing the LDF ambiguity where
; PlatformIO would otherwise treat the bare include/ subdirectory as a
; header-only "include" virtual library rather than linking the full src/ tree.
; Only -I . is kept manually so LVGL can find lv_conf.h in this directory.
[env_base_example]
lib_ldf_mode   = chain
lib_extra_dirs = ..
lib_ignore = **/.pio/**

[env:hello_2424s012]
extends        = lcd_ctrl_2424s012, env_base_example
build_flags    = ${lcd_ctrl_2424s012.build_flags}
                 -I .
lib_deps       = ${lcd_ctrl_2424s012.lib_deps}
                 symlink://../
board_build.partitions = ../config/esp32/partitions_4MB.csv

; =============================================================================
; ── Guition / Sunton ESP32-4848S040
; Requires migrating guition_4848s040.cpp (see README.md)
; =============================================================================
[env:hello_4848s040]
