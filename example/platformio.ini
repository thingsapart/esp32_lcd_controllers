build_flags    = ${lcd_ctrl_4848s040.build_flags}
                 -I .
lib_deps       = ${lcd_ctrl_4848s040.lib_deps}
                 symlink://../
board_build.partitions = ../config/esp32/partitions_16MB_4MB_app.csv

